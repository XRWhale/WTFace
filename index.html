<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Face Reading - Discover Your Animal Spirit</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <!-- Screen 1: Upload -->
  <div class="container" id="uploadScreen">
    <div class="header-icon">🔮</div>
    <h1>AI Face Reading</h1>
    <p class="subtitle">Discover your animal spirit through ancient Eastern physiognomy</p>

    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📸</div>
      <p class="upload-text">Tap to upload your photo</p>
      <p class="upload-hint">or drag & drop here</p>
      <input type="file" id="fileInput" accept="image/*" hidden />
    </div>

    <div class="preview-area" id="previewArea" style="display:none;">
      <img id="previewImg" />
      <button class="btn btn-secondary" id="retakeBtn">Choose Another</button>
    </div>

    <button class="btn btn-primary" id="analyzeBtn" disabled>Analyze My Face</button>

    <p class="disclaimer">🎭 For entertainment only. Not based on real science!</p>
  </div>

  <!-- Screen 2: Analyzing -->
  <div class="container" id="analyzingScreen" style="display:none;">
    <div class="scanner-wrapper">
      <img id="scanImg" class="scan-photo" />
      <div class="scan-line"></div>
    </div>
    <h2 class="analyzing-text">Reading your face...</h2>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <p class="analyzing-detail" id="analyzingDetail">Detecting face shape...</p>
  </div>

  <!-- Screen 3: Result -->
  <div class="container result-container" id="resultScreen" style="display:none;">
    <div id="resultContent"></div>
    <div class="result-actions">
      <button class="btn btn-primary" id="shareBtn">Share Result 📤</button>
      <button class="btn btn-secondary" id="retryBtn">Try Again</button>
    </div>
  </div>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
